<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Juego del Aire</title>
    <style>
      @font-face {
        font-family: 'Press Start 2P';
        font-style: normal;
        font-weight: 400;
        font-display: block;
        src: url('/assets/fonts/PressStart2P.woff2') format('woff2');
      }
      /* Fuerza la carga de la fuente antes de que Phaser arranque */
      body::before {
        content: '';
        font-family: 'Press Start 2P', monospace;
        position: absolute;
        visibility: hidden;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #5a7a40;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
        object-fit: cover;
      }
    </style>
  </head>
  <body>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
