<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Juego del Aire</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Anton&family=Pixelify+Sans:wght@700&family=VT323&family=Orbitron:wght@700&family=Russo+One&family=Bungee&family=Teko:wght@700&family=Righteous&display=block" rel="stylesheet">
    <style>
      /* Fuerza la carga de la fuente antes de que Phaser arranque */
      body::before {
        content: '';
        font-family: 'Press Start 2P', monospace;
        position: absolute;
        visibility: hidden;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #5a7a40;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
        object-fit: cover;
      }
    </style>
  </head>
  <body>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
